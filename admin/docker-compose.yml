version: '3.8'

name: classroom

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: classroom-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 持久化数据库和上传文件（指向应用端的数据库，使两个系统使用同一个数据库）
      - ../应用端/data/sqlite:/app/data
      - ./data/uploads:/app/uploadPath
    environment:
      - PORT=8080
      - SQLITE_PATH=/app/data/demo.sqlite
      - LOGIN_ENABLE=true
      - CACHE_TYPE=local
      - DB_TYPE=sqlite
      - UPLOAD_PATH=/app/uploadPath
    networks:
      - classroom-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务（包含 Nginx）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: classroom-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - classroom-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  classroom-network:
    driver: bridge

volumes:
  sqlite-data:
  upload-data:

