user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 100M;

    server {
        listen       80;
        server_name  localhost;

        # 前端静态文件 - 智慧教室管理系统
        location /classroom/ {
            alias  /usr/share/nginx/html/classroom/;
            try_files $uri $uri/ /classroom/index.html;
        }
        
        # 处理 /classroom 重定向到 /classroom/
        location = /classroom {
            return 301 /classroom/;
        }

        # 后端 API 代理
        location /classroom-backend/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 重写路径，去掉 /classroom-backend 前缀
            rewrite ^/classroom-backend/(.*)$ /$1 break;
            
            # 代理到后端服务
            proxy_pass http://backend:8080;
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}

